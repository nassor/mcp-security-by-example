# Casbin RBAC model.
#
# A request is (subject, object, action). A policy line grants a (role, object, action).
# `g` maps a user to a role. The matcher allows a request when the user's role has a
# policy for that exact object and action. CRUD needs no special handling: the action is
# just a string ("create" / "read" / "update" / "delete") compared verbatim.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act
